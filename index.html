<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>KFC Checklist</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="device-shell">
        <header class="topbar">
          <div>
            <p id="system-date" class="eyebrow">LOADING</p>
            <h1 id="system-clock" class="clock">00:00:00</h1>
          </div>
          <div class="status-chip">
            <span class="status-dot"></span>
            <span id="mode-status">ACTIVE</span>
          </div>
        </header>

        <div class="global-progress" aria-hidden="true">
          <div id="global-progress-fill" class="global-progress-fill"></div>
        </div>

        <section id="summary-card" class="summary-card"></section>
        <section id="role-switch" class="role-switch"></section>

        <section class="quick-actions">
          <button id="toggle-edit" type="button" class="surface-button">Edit Template</button>
          <button id="start-session" type="button" class="surface-button">New Session</button>
          <button id="open-settings" type="button" class="surface-button">Settings</button>
        </section>

        <section id="meta-row" class="meta-row"></section>
        <section id="phase-stack" class="phase-stack"></section>
      </div>
    </main>

    <button id="floating-button" type="button" class="floating-button">Manage</button>

    <div id="sheet-overlay" class="sheet-overlay">
      <section id="settings-sheet" class="settings-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <div>
            <span class="eyebrow">Shift Control</span>
            <h3>Settings</h3>
          </div>
          <button id="close-settings" type="button" class="ghost-button">Close</button>
        </div>

        <div class="sheet-group">
          <button id="sheet-start-session" type="button" class="sheet-action"></button>
          <button id="sheet-toggle-edit" type="button" class="sheet-action"></button>
          <button id="sheet-install" type="button" class="sheet-action"></button>
          <button id="sheet-export" type="button" class="sheet-action"></button>
          <button id="sheet-import" type="button" class="sheet-action"></button>
        </div>

        <div class="sheet-note">
          <span class="eyebrow">Tip</span>
          <p id="sheet-note-copy">Template changes apply to the next session.</p>
        </div>
      </section>
    </div>

    <input id="import-file" type="file" accept="application/json" hidden />

    <script type="module" src="./app.js"></script>
  </body>
</html>
